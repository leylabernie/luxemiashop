        <h2>About LuxeMia</h2>
        <p>LuxeMia is an Indian ethnic wear boutique founded in 2025 and operated by Glamour Indian Wear. We serve the NRI diaspora and ethnic-fashion lovers in the United States, Canada, and Australia, offering authentic designer Indian clothing at affordable prices. Every piece is sourced directly from skilled Indian artisans and textile hubs — no middlemen, no inflated markups. Our catalog includes bridal lehengas, wedding sarees, salwar kameez suits, sherwanis, and indo-western outfits, with three fit options: Unstitched (DIY), Ready to Wear (standard sizes 32–48), and Made to Measure (custom-stitched to your body measurements).</p>

        <h2>Shipping &amp; Returns</h2>
        <p><strong>Shipping:</strong> Free on orders over $350 USD to USA, Canada, and Australia. Flat $25 USD per order for orders under $350. Ready-to-wear items dispatch in 3–5 business days; made-to-measure and custom-stitched items dispatch in 5–7 business days. Transit time 7–10 business days via USPS/UPS/DHL with full tracking and insurance. Customers are responsible for any customs duties or import fees levied by their country.</p>
        <p><strong>Returns:</strong> All sales are final. LuxeMia does not accept returns or exchanges for any reason, including sizing issues or colour variations. The only exception is genuine shipping damage, which must be reported within 48 hours of delivery with a mandatory unboxing video. Cancellations are accepted within 24 hours of order placement for a full refund.</p>
